# ==================================================================
#  CompChemUtils — machine-specific configuration
# ==================================================================
#  COPY this file to machine_config.yaml (repo root) and fill in paths.
#  machine_config.yaml is git-ignored.
#
#  Paths support ~ (home) and $VAR (environment variables).
#
#  DFTB+ has THREE layers (do not confuse them):
#    1. tools.dftb_bin          — subprocess `dftb+` (relax, phonons, batch jobs)
#    2. dftb.libdftbcore        — ctypes in-process SCF + matrix export (py.dftb.DFTBcore)
#    3. py/dftb/kernels/*.cl    — OpenCL grid/STM projection (in-repo, no path needed)
#
#  Typical fork layout:
#    ~/git/dftbplus/_build/app/dftb+/dftb+     → tools.dftb_bin (dev binary)
#    ~/opt/dftbplus/lib/libdftbcore.so         → dftb.libdftbcore (until _build target built)
#    ~/SIMULATIONS/dftbplus/slakos/            → sk_dir
# ==================================================================

# ---- External executables (bare name = search PATH) ----
tools:
  xtb_bin: xtb              # GFN1/2-xTB, GFN-FF (or use pip tblite for GFN1/2 only)
  g_xtb_bin: xtb-gxtb       # g-xTB (transition-metal optimised)
  dftb_bin: dftb+           # DFTB+ SCC-DFTB subprocess (prefer full path to fork binary)
  dftb_bin_installed: dftb+ # optional fallback install prefix
  lammps_bin: lmp_serial
  gpaw_command: python3 -m gpaw
  phonopy_bin: phonopy

# ---- DFTB+ libraries and fork ----
dftb:
  repo: /path/to/dftbplus/fork
  libdftbcore: /path/to/libdftbcore.so   # py.dftb.DFTBcore (in-process)
  libdftbplus: /path/to/libdftbplus.so   # dftbplus pip API (tools/pythonapi)
  wfc_data_dir: py/dftb/data             # relative to repo root, or absolute path
  ld_library_extra: []                   # extra dirs for ctypes .so (usually empty)

# ---- Python path roots (legacy; prefer py.dftb in new code) ----
paths:
  pyball: /path/to/FireCore    # legacy: pyBall.DFTB.* in old examples
  dftb_pyball: /path/to/dftbplus

# ---- DFTB+ Slater–Koster files ----
# Root of slakos tree. Sets live in subdirs: library/3ob-3-1, mio/mio-1-1, auorg/auorg-1-1, …
# DFTBPlusBackend(sk_path=...) needs the directory containing .skf files for one set.
sk_dir: /path/to/dftbplus/slakos

# ---- Large external data directories ----
data_dirs:
  phonondb_dir: /path/to/phononDB_repo
  lammps_potentials: /path/to/lammps/potentials
  mmff_data_dir: /path/to/FireCore/cpp/common_resources
  fireball_fdata_dir: /path/to/Fireball_Data

# ---- Default PBS / cluster settings ----
cluster:
  default_queue: gpu
  default_walltime_h: 12.0
  default_modules:
    - python/3.10
    - gcc/11

# ---- Default parameters for QC backends ----
qc_defaults:
  dftb_temperature_K: 300.0
  dftb_maxiter: 250
  xtb_threads: 4
  gpaw_ecut_eV: 300.0
